name: Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Setup Release Keystore
      run: |
        if [ ! -f my-upload-key.jks ]; then
          echo "Generating a new release keystore for CI..."
          keytool -genkey -v -keystore my-upload-key.jks -storepass android -alias upload -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Release,O=Android,C=US"
        fi

    - name: Build Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        STORE_PASSWORD: android
        KEY_PASSWORD: android
      run: gradle assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/*.apk
